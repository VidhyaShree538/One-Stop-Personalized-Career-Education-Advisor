<!DOCTYPE html>
<html>

<head>
    <title>Career Roadmap</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e4ecf5;
            margin: 0;
        }
        
        .container {
            width: 700px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
        }
        
        h2 {
            text-align: center;
            color: #2c66b2;
        }
        
        ul {
            margin-top: 20px;
            padding-left: 20px;
        }
        
        li {
            background: #eef4fb;
            margin: 8px 0;
            padding: 10px;
            border-radius: 5px;
        }
        
        button {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background: #2c66b2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        
        button:hover {
            background: #1d4f8a;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Your Career Roadmap</h2>
        <h3 id="careerName"></h3>
        <ul id="roadmap"></ul>
        <button onclick="goBack()">Back to Recommendations</button>
    </div>

    <script>
        const userId = localStorage.getItem("userId");
        const careerName = localStorage.getItem("selectedCareer");

        const careerTitle = document.getElementById("careerName");
        const roadmapDiv = document.getElementById("roadmap");

        if (!userId || !careerName) {
            roadmapDiv.innerHTML = "<li>No user or career selected. Please complete the assessment first.</li>";
        } else {
            careerTitle.innerText = careerName;

            fetch(`/get-roadmap?user_id=${userId}&career_name=${careerName}`)
                .then(res => {
                    if (!res.ok) throw new Error("Failed to fetch roadmap");
                    return res.json();
                })
                .then(data => {
                    if (!data.roadmap || data.roadmap.length === 0) {
                        roadmapDiv.innerHTML = "<li>No roadmap found for this career.</li>";
                        return;
                    }

                    roadmapDiv.innerHTML = data.roadmap
                        .map((step, i) => `<li><b>Step ${i + 1}:</b> ${step}</li>`)
                        .join("");
                })
                .catch(err => {
                    console.error("Error fetching roadmap:", err);
                    roadmapDiv.innerHTML = "<li>Unable to load roadmap. Make sure the backend is running.</li>";
                });
        }

        function goBack() {
            window.location.href = "career-result.html";
        }
    </script>
</body>

</html>
